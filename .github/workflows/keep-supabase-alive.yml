name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1,4'   # Mon & Thu — every 3-4 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all Supabase projects
        env:
          PROJECTS: ${{ secrets.SUPABASE_PROJECTS_JSON }}
        run: |
          echo "$PROJECTS" | jq -c '.[]' | while read project; do
            URL=$(echo "$project" | jq -r '.url')
            KEY=$(echo "$project" | jq -r '.anon_key')

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $KEY" \
              "${URL}/auth/v1/health")

            if [ "$STATUS" = "200" ]; then
              echo "✅ $URL — alive"
            else
              echo "❌ $URL — HTTP $STATUS"
              exit 1
            fi
          done
